<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/company-view/{{ this.company_id }}"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  <ion-list *ngIf="company.parentTransfers">
    <ion-card *ngFor="let transfer of company.parentTransfers" tappable [routerLink]="'/transfer-view/' + transfer.transfer_id">
      <ion-card-content>
        <p><strong>Transfer #{{ transfer.transfer_id}}</strong></p>
        <h2><strong>KWD {{ transfer.company_total | number:'1.3-3' }}</strong></h2>
        <p>
          <strong>Status: </strong>
          <span class="status status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status==10"> Draft </span>
          <span class="status status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status==5"> Locked,
            Pending Payment </span>
          <span class="status status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status==1"> Payment Sent,
            Confirm Received </span>
          <span class="status status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status==3"> Received &
            Distribution in Progress </span>
          <span class="status status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status==4"> Completed
          </span>
        </p>
        <p><strong>Created on: </strong> {{transfer.transfer_created_at}}</p>
      </ion-card-content>
    </ion-card>
  </ion-list>
</ion-content>

<ion-footer *ngIf="company">
  <ion-button (click)="presentActionSheetForNewTransfer()">
    Create New <br/> Transfer
  </ion-button>
</ion-footer>
