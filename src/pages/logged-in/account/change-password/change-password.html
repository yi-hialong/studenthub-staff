<ion-header>
    <ion-navbar>
        <button ion-button menuToggle="left">
            <ion-icon name="menu"></ion-icon>
        </button>
        <ion-title>Change Password</ion-title>
        <ion-buttons right>
        <button ion-button clear color="primary" [disabled]="!form.valid || !form.dirty" (click)="save()">
            Save
        </button>
        </ion-buttons>
    </ion-navbar>
</ion-header>

<ion-content>

    <form [formGroup]="form">
        <ion-item>
            <ion-label floating>Current Password</ion-label>
            <ion-input type="text" formControlName="password"></ion-input>
        </ion-item>
        <ion-item>
            <ion-label floating>New Password</ion-label>
            <ion-input type="password" formControlName="newPassword"></ion-input>
        </ion-item>
    </form>
</ion-content>
