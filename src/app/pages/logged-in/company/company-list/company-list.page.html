<ion-header mode="md" [class.add-border]="borderLimit" class="ion-no-border" [class.hidden]="borderLimit">
  <ion-toolbar class="container title">
    <ion-title class="ion-text-wrap">
      Clients
      <ion-chip *ngIf="totalCount > 0">
        {{totalCount}}
        </ion-chip>
    </ion-title>
  </ion-toolbar>
  <ion-toolbar class="container search searchbar-wrapper">
    
    <ion-searchbar debounce="500" placeholder="Type to search" (ionChange)="searchByName($event)"></ion-searchbar>

    <ion-buttons slot="end">
      <ion-button class="ion-text-capitalize setting" [class.active]="filters.withStats || filters.staff_id || (filters.status && filters.status != 100) || (filters.approved_to_hire || filters.approved_to_hire == 0)" (click)="filter()">
        <ion-icon name="options"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="container">

    <div *ngIf="filters.withStats || filters.staff_id || (filters.status && filters.status != 100) || (filters.approved_to_hire || filters.approved_to_hire == 0)" class="filter-tag">
      
      <ion-chip *ngIf="filters.status == 1" (click)="filterByStatus($event, 1)">
        Active <ion-icon name="close-outline"></ion-icon>
      </ion-chip>

      <ion-chip *ngIf="filters.status == 2"  (click)="filterByStatus($event, 2)">
        Inactive <ion-icon name="close-outline"></ion-icon>
      </ion-chip>

      <ion-chip *ngIf="filters.status == 9" (click)="filterByStatus($event, 9)">
        Under Review <ion-icon name="close-outline"></ion-icon>
      </ion-chip>

      <ion-chip *ngIf="filters.status == 3" (click)="filterByStatus($event, 3)">
        Active + 40 days no payment <ion-icon name="close-outline"></ion-icon>
      </ion-chip>
      
      <ion-chip *ngIf="filters.status == 4" (click)="filterByStatus($event, 4)">
        Active + 40 days no new request <ion-icon name="close-outline"></ion-icon>
      </ion-chip>
      
      <ion-chip *ngIf="filters.approved_to_hire == 1" (click)="filterByApprovedToHire($event, 1)">
        Approved to hire <ion-icon name="close-outline"></ion-icon>
      </ion-chip>

      <ion-chip *ngIf="filters.approved_to_hire == 0" (click)="filterByApprovedToHire($event, 0)">
        Not approved to hire <ion-icon name="close-outline"></ion-icon>
      </ion-chip>

      <ion-chip *ngIf="filters.withStats" (click)="filterWithStats($event)">
        Show metadata <ion-icon name="close-outline"></ion-icon>
      </ion-chip>
      
      <ion-chip *ngIf="filters.staff_id == authService.staff_id" (click)="filterByStaff($event, authService.staff_id)">
        Assigned to you <ion-icon name="close-outline"></ion-icon>
      </ion-chip>
      
    </div>

    <ion-list *ngIf="!loading">
      <section>
        <app-company [company]="company" *ngFor="let company of companies" (click)="rowSelected(company)"></app-company>
      </section>
    </ion-list>

    <loading-modal [loading]="loading || loadingMore" type="company-list"></loading-modal>

    <no-items *ngIf="!loading && !loadingMore && companies && companies.length==0" message="~ No company available ~"></no-items>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="create()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
