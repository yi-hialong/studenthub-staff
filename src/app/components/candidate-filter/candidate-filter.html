<div class="filter-group-wrapper" [attr.dir]="translateLabel.direction()">

    <h4 class="filter-group-name">{{ "Profile" | translate }}</h4>

    <div class="filter-groups">

        <refinement-list label="{{ 'Tags' | translate }}" [searchable]="true"
            data-sort-order="0" [class.is-refined]="arrRefined['candidateTags.tag']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateTags.tag"></refinement-list>

        <refinement-list data-sort-order="1" [class.is-refined]="arrRefined && arrRefined['candidate_gender']"
            label="{{ 'Gender' | translate }}" operator="or" [transformItems]="genderTransformItems"
            attribute="candidate_gender"></refinement-list>

        <age-refinement-list data-sort-order="2"
            [class.is-refined]="arrRefined['candidate_birth_timestamp']" title="Age"
            operator="or" attribute="candidate_birth_timestamp"></age-refinement-list>

            <!--
        <date-range-refinement-list data-sort-order="3"
            [class.is-refined]="arrRefined['candidate_birth_timestamp']" title="Date of Birth"
            operator="or" attribute="candidate_birth_timestamp"></date-range-refinement-list>
-->
        <date-range-refinement-list data-sort-order="3"
            [class.is-refined]="arrRefined['candidate_created_at_timestamp']" title="Created By"
            operator="or" attribute="candidate_created_at_timestamp"></date-range-refinement-list>

        <range-refinement-list data-sort-order="4"
            [class.is-refined]="arrRefined['candidate_updated_at_timestamp']" title="Update By"
            operator="or" attribute="candidate_updated_at_timestamp"></range-refinement-list>

        <refinement-list data-sort-order="5" [class.is-refined]="arrRefined && arrRefined['candidate_driving_license']"
            label="{{ 'Driving license' | translate }}" operator="or" [transformItems]="booleanTransformItems"
            attribute="candidate_driving_license"></refinement-list>

        <refinement-list data-sort-order="6" [class.is-refined]="arrRefined && arrRefined['have_video']"
            label="{{ 'Have Video?' | translate }}" operator="or"
            attribute="have_video"></refinement-list>

        <refinement-list data-sort-order="7" [class.is-refined]="arrRefined && arrRefined['have_resume']"
            label="{{ 'Have Resume?' | translate }}" operator="or"
            attribute="have_resume"></refinement-list>

        <refinement-list data-sort-order="8" [class.is-refined]="arrRefined && arrRefined['candidate_committed']"
            label="{{ 'Committed?' | translate }}" operator="or"
            attribute="candidate_committed"></refinement-list>

        <refinement-list label="{{ 'Bank' | translate }}" [searchable]="true"
            data-sort-order="9" [class.is-refined]="arrRefined['bank.bank_name']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="bank.bank_name"></refinement-list>

        <refinement-list label="{{ 'Home Location' | translate }}" [searchable]="true"
            data-sort-order="10" [class.is-refined]="arrRefined['currentLocations.en']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="currentLocations.en"></refinement-list>

        <refinement-list label="{{ 'Nationality' | translate }}" [searchable]="true"
            data-sort-order="11" [class.is-refined]="arrRefined['country.country_name_en']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="country.country_name_en"></refinement-list>

        <refinement-list label="{{ 'Mom Kuwaiti' | translate }}" data-sort-order="12" [class.is-refined]="arrRefined['candidate_mom_kuwaiti']"
            attribute="candidate_mom_kuwaiti" [transformItems]="kuwaitiMomTransformItems"></refinement-list>

        <refinement-list label="{{ 'Currency Code' | translate }}" data-sort-order="13" [class.is-refined]="arrRefined['currency_code']"
            attribute="currency_code"></refinement-list>
    
    </div>

    <h4 class="filter-group-name">{{ "Education" | translate }}</h4>

    <div class="filter-groups">

        <refinement-list label="{{ 'Skill' | translate }}" [searchable]="true"
            data-sort-order="1" [class.is-refined]="arrRefined['candidateSkills.skill']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateSkills.skill"></refinement-list>

        <refinement-list label="{{ 'Experience' | translate }}" [searchable]="true"
            data-sort-order="2" [class.is-refined]="arrRefined['candidateExperiences.experience']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateExperiences.experience"></refinement-list>

        <refinement-list label="{{ 'School/University' | translate }}" [searchable]="true"
            data-sort-order="3" [class.is-refined]="arrRefined['university.university_name']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="university.university_name"></refinement-list>
        
        <refinement-list data-sort-order="4" [class.is-refined]="arrRefined && arrRefined['candidateEducations.is_currently_studying']"
                    label="{{ 'Currently Studying' | translate }}" operator="or" [transformItems]="studyingTransformItems"
                    attribute="candidateEducations.is_currently_studying"></refinement-list>

        <refinement-list label="{{ 'Graduation Year' | translate }}" [searchable]="true"
            data-sort-order="5" [class.is-refined]="arrRefined['candidateEducations.graduation_year']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateEducations.graduation_year"></refinement-list>

        <refinement-list label="{{ 'Degree' | translate }}" [searchable]="true"
            data-sort-order="6" [class.is-refined]="arrRefined['candidateEducations.degree.degree_name_en']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateEducations.degree.degree_name_en"></refinement-list>

        <refinement-list label="{{ 'Field of Study' | translate }}" [searchable]="true"
            data-sort-order="7" [class.is-refined]="arrRefined['candidateEducations.major.major_name_en']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateEducations.major.major_name_en"></refinement-list>

    </div>

    <h4 class="filter-group-name">{{ "Current Assignment" | translate }}</h4>

    <div class="filter-groups">

        <refinement-list label="{{ 'Company' | translate }}" [searchable]="true"
            data-sort-order="1" [class.is-refined]="arrRefined['store.company.company_name']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="store.company.company_name"></refinement-list>

        <refinement-list label="{{ 'Store' | translate }}" [searchable]="true"
            data-sort-order="2" [class.is-refined]="arrRefined['store.store_name']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="store.store_name"></refinement-list>

        <refinement-list data-sort-order="3" [class.is-refined]="arrRefined && arrRefined['assigned']"
            label="{{ 'Assigned' | translate }}" operator="or" [transformItems]="assignedTransformItems"
            attribute="assigned"></refinement-list>
            
        <date-range-refinement-list data-sort-order="4"
            [class.is-refined]="arrRefined['start_date_timestamp']" title="Assigned date range"
            operator="or" attribute="start_date_timestamp"></date-range-refinement-list>
        
    </div>

    <h4 class="filter-group-name">{{ "Certificates" | translate }}</h4>

    <div class="filter-groups">

        <refinement-list label="{{ 'Certificate Name' | translate }}" [searchable]="true"
            data-sort-order="1" [class.is-refined]="arrRefined['candidateCertificates.certificateName.en']"
            searchPlaceholder="{{ 'Search here...' | translate }}" showMoreLabel="{{ 'Show more' | translate }}"
            showLessLabel="{{ 'Show less' | translate }}" showMoreLimit="15" operator="or"
            attribute="candidateCertificates.certificateName.en"></refinement-list>
    </div>

</div>
