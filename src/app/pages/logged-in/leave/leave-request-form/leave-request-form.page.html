<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Create New Leave Request</ion-title>
    <ion-buttons slot="end">
      <ion-button color="primary" [disabled]="!form || !form.dirty || !form.valid || loading" (click)="save()">
        <span *ngIf="!loading">Save</span>
        <ion-spinner *ngIf="loading"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <form [formGroup]="form">
    <ion-list>

      <ion-item class="input-wrapper txt-date-range">
        <div tabindex="0"></div>
        <ion-label position="floating">Time Period</ion-label>
        <ion-input [value]="range" (click)="openCalendarPopup($event)"></ion-input>
        <ion-icon src="assets/images/icon-date-range.svg"></ion-icon>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label position="floating">Type</ion-label>
        <ion-select formControlName="type">
          <ion-select-option value="1">Vacation</ion-select-option>
          <ion-select-option value="2">Sick Leave</ion-select-option>
          <ion-select-option value="3">Casual Leave</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label position="floating">Note</ion-label>
        <ion-input type="text" formControlName="note"></ion-input>
      </ion-item>
    </ion-list>

    <ion-item tappable>
      <div tabindex="0"></div>
      <ion-label position="floating">Attachment</ion-label>
      <ion-input type="text" readonly formControlName="file"></ion-input>
      <ion-buttons slot="end">

        <!-- download -->

        <ion-button *ngIf="form.controls['file'].value"
                    [href]="getFileUrl()" target="_blank">
          <ion-icon name="cloud-download-outline"></ion-icon>
        </ion-button>

        <!-- change/ upload -->

        <ion-button>
          <ion-icon name="cloud-upload-outline"></ion-icon>
          <input class="upload" accept=".pdf,.doc,.docx" type='file' #fileInput (change)="browserUpload($event)">
        </ion-button>

        <!-- remove -->

        <ion-button *ngIf="form.controls['file'].value"
                    (click)="removeResume($event)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>

    <div class="error-wrapper" *ngIf="!form.controls['file'].pristine">
      <p class="error" *ngIf="form.controls['file'].errors && form.controls['file'].errors.required">
        * required
      </p>
    </div>
  </form>

</ion-content>
<ion-footer>
  <ion-button expand="full">Save</ion-button>
</ion-footer>
