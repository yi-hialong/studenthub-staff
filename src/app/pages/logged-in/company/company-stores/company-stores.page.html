<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button (click)="dismiss()"></ion-back-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="addStore()">
        Add a store
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  <ion-list *ngIf="company && company.stores && company.stores.length > 0">

    <h3 class="title">
      Stores
    </h3>
    <h4 class="company-name">
      {{ (company.company_common_name_en) ?  company.company_common_name_en:company.company_name }}
    </h4>

      <ion-item tappable (click)="storeSelected(store)" *ngFor="let store of company.stores" lines="none">
        <div tabindex="0"></div>
        <ion-label>
          <h5>{{ store.store_name }}</h5>

            <p *ngIf="store.store_location" class="icon-location">
              <ion-icon name="navigate-outline"></ion-icon> {{ store.store_location }}
            </p>
            <p *ngIf="store && store.brand" class="icon-location">
              <ion-icon name="pricetag-outline"></ion-icon> {{ store.brand.brand_name_en }}
            </p>
            <p *ngIf="store && store.mall">
              <ion-icon name="storefront-outline"></ion-icon> {{ store.mall.mall_name_en }}
            </p>
        </ion-label>

        <ion-badge slot="end" *ngIf="store.store_total_candidates > 0">
          {{ store.store_total_candidates }} staff
        </ion-badge>
      </ion-item>
  </ion-list>
  <loading-modal [loading]="loading" type="text-list"></loading-modal>
</ion-content>
<ion-footer>


</ion-footer>
