<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button (click)="dismiss()"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  
  <ion-card class="welcome-card" [hidden]="!legendDisplay || (statsData && !statsData.length)">
    <ion-card-header>
      <ion-card-title> Completed / Received / InProgress Transfer/ Profit, Total Candidates, Total Paid Candidate,
        Candidate Average Payment,Average Profit/Candidate</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <canvas #statsChart></canvas>
    </ion-card-content>
  </ion-card>

  <canvas #statsChart></canvas>
</ion-content>
