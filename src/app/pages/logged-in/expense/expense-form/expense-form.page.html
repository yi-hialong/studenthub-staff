<ion-header mode="md" [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar class="container">
    <ion-buttons slot="start">
      <ion-back-button icon="assets/images/icon-back.svg" (click)="close()"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ operation }}</ion-title>
    <ion-buttons slot="end">
      <ion-button color="primary" [disabled]="!form || !form.dirty || !form.valid || loading" (click)="save()">
        <span *ngIf="!loading">Save</span>
        <ion-spinner *ngIf="loading"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  <div class="container">
    <form [formGroup]="form">
      <ion-list>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">Supplier</ion-label>
          <ion-input type="text" formControlName="supplier"></ion-input>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">Category</ion-label>
          <ion-select formControlName="category" interface="popover">
            <ion-select-option value="1">Accommodations</ion-select-option>
            <ion-select-option value="2">Company Resources</ion-select-option>
            <ion-select-option value="3">Education and training</ion-select-option>
            <ion-select-option value="4">Meals</ion-select-option>
            <ion-select-option value="5">Miscellaneous</ion-select-option>
            <ion-select-option value="6">Rent and utilities</ion-select-option>
            <ion-select-option value="7">Software license</ion-select-option>
            <ion-select-option value="8">Travel</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="stacked">Purchase Date</ion-label>
          <ion-input type="date" formControlName="purchase_date"></ion-input>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">Total Amount</ion-label>
          <ion-input type="text" formControlName="total_amount"></ion-input>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">Currency</ion-label>
          <ion-input type="text" formControlName="currency"></ion-input>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">VAT</ion-label>
          <ion-input type="text" formControlName="vat"></ion-input>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-checkbox formControlName="reimbursable" slot="end"></ion-checkbox>
          <ion-label>Reimbursable</ion-label>
        </ion-item>
        <ion-item>
          <div tabindex="0"></div>
          <ion-label position="floating">description</ion-label>
          <ion-input type="text" formControlName="description"></ion-input>
        </ion-item>

        <ion-item tappable>
          <div tabindex="0"></div>
          <ion-label position="floating">Attachment</ion-label>
          <ion-input type="text" readonly formControlName="file"></ion-input>
          <ion-buttons slot="end">

            <!-- download -->

            <ion-button *ngIf="form.controls['file'].value"
                        [href]="getResumeUrl()" target="_blank">
              <ion-icon name="cloud-download-outline"></ion-icon>
            </ion-button>

            <!-- change/ upload -->

            <ion-button>
              <ion-icon name="cloud-upload-outline"></ion-icon>
              <input class="upload" accept=".pdf,.doc,.docx" type='file' #fileInput (change)="browserUpload($event)">
            </ion-button>

            <!-- remove -->

            <ion-button *ngIf="form.controls['file'].value"
                        (click)="removeResume($event)">
              <ion-icon name="trash-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-item>

        <div class="error-wrapper" *ngIf="!form.controls['file'].pristine">
          <p class="error" *ngIf="form.controls['file'].errors && form.controls['file'].errors.required">
            * required
          </p>
        </div>
      </ion-list>
    </form>
  </div>
</ion-content>
<ion-footer class="ion-no-border">
  <div class="container">
    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-button expand="full" color="primary" [disabled]="!form || !form.dirty || !form.valid || loading" (click)="save()">
            <span *ngIf="!loading">Save</span>
            <ion-spinner *ngIf="loading"></ion-spinner>
          </ion-button>
        </ion-col>
        <ion-col>
          <ion-button expand="full" (click)="close()">
            Cancel
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-footer>
