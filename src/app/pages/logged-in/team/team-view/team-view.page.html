<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/company-list"></ion-back-button>
    </ion-buttons>
    <ion-title *ngIf="staff">{{ staff.staff_name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">

  <ion-list *ngIf="!loading && staff">
    <section>
      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Name</h3>
          <p>{{ staff.staff_name }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Email</h3>
          <p>{{ staff.staff_email }}</p>
        </ion-label>
      </ion-item>
    </section>
  </ion-list>
  <ion-list-header>
    <ion-label>List Notes</ion-label>
  </ion-list-header>
  <ion-list *ngIf="!loading">
    <section>
      <ion-item tappable *ngFor="let note of notes">
        <div tabindex="0"></div>
        <ion-label class="ion-text-wrap">
          <p [innerHTML]="note.note_text"></p>
          <ion-badge class="company_status_badge" slot="start" color="light">
            {{note.note_type}}
          </ion-badge>
          <ion-badge class="company_status_badge" slot="start" color="warning" *ngIf="note.candidate_id">
            Candidate
          </ion-badge>
          <ion-badge class="company_status_badge" slot="start" color="primary" *ngIf="note.company_id">
            Company
          </ion-badge>
          <br/>
          <small>{{note.note_created_datetime | date}}</small>
        </ion-label>
      </ion-item>
    </section>
  </ion-list>
  <no-items message = "No notes yet!" *ngIf="!loading && !loadMore && notes.length == 0"></no-items>

  <loading-modal [loading]="loading || loadMore" type="text-list"></loading-modal>
  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
