
<ion-header mode="md" [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar class="container">
    <ion-buttons slot="start">
      <ion-back-button icon="assets/images/icon-back.svg" defaultHref="/view/tasks"></ion-back-button>
    </ion-buttons>
    <ion-title>Company registration request <small>({{totalCount}})</small></ion-title>
    <ion-progress-bar type="indeterminate" *ngIf="deleting"></ion-progress-bar>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" class="ion-no-padding" (ionScroll)="logScrolling($event)">
  <div class="container">

    <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
      <ion-refresher-content></ion-refresher-content>
    </ion-refresher>
 
    <ion-list>
      <ion-item-sliding *ngFor="let request of requests">
        <!-- [routerLink]="'/company-registration-request-view/' + request.company_request_uuid" -->
        <ion-item (click)="viewRequest(request)" tappable>
          <div tabindex="0"></div>
          <ion-label>
            <h5>{{ request.company_name }}</h5>
            <p>{{ translateService.toDate(request.created_at) | date }}</p>
          </ion-label> 
        </ion-item>
      </ion-item-sliding>

      <loading-modal [loading]="loading" type="text-list"></loading-modal>
    </ion-list>

  </div>
  <ion-infinite-scroll *ngIf="currentPage < pageCount"
    (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
