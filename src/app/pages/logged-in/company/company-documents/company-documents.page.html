<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/company-view/{{ this.company_id }}"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">

  <ion-card class="document" target="_blank" href="{{ awsService.permanentBucketUrl }}{{ file.file_s3_path }}" *ngFor="let file of company.files">
    <ion-card-content>

      <img class="icon" src="assets/images/ic_save.svg" />
      
      <span class="meta-data">{{ getFileType(file.file_type) }}</span>
      <span class="meta-data">{{ file.file_size | filesize }}</span>

      <h5>{{ file.file_title }}</h5>

      <p class="document-detail">{{file.file_description}}</p>

      <p class="date">Uploaded on {{ toDate(file.file_created_datetime) | date: 'MMM d, y' }}</p>
    </ion-card-content>
  </ion-card>

  <ion-item lines="none">
    <div tabindex="0"></div>
    <ion-button (click)="uploadDocument()">
      <span>Upload Document</span>
    </ion-button>
  </ion-item>
</ion-content>
