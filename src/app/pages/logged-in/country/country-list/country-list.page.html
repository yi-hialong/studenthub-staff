<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Countries</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let country of countries" (click)="rowSelected(country)">
      <ion-label>
        {{ country.country_name_en }}
      </ion-label>
      <ion-badge slot="end" *ngIf="country.total_candidates > 0">
        {{ country.total_candidates }} candidates
      </ion-badge>
    </ion-item>
  </ion-list>

  <ion-row class="ion-text-center">
    <div class="pagination-wrapper">
      <ion-button *ngFor="let page of pages" size="small" color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
        {{ page }}
      </ion-button>
    </div>
  </ion-row>

</ion-content>

<ion-footer>

</ion-footer>
