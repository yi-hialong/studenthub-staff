<ion-content>
  
  <div class="drager"></div>
  
  <h3>
    Filter Results

    <ion-button (click)="reset()" class="btn-close">
      Reset
    </ion-button>
  </h3>

    <h5>Status</h5>

    const STATUS_UNSTARTED = 0;
    const STATUS_STARTED = 1;

    const STATUS_FINISHED = 2;
    const STATUS_DELIVERED = 3;
    
    const STATUS_REJECTED = 4;
    
    const STATUS_ACCEPTED = 5;

    <ion-button class="btn-option" (click)="filterByStatus($event, null)" [class.active]="filters.status == null">All</ion-button>
    <ion-button class="btn-option" (click)="filterByStatus($event, 'pending')" [class.active]="filters.status == 'pending'">Pending</ion-button>
    <ion-button class="btn-option" (click)="filterByStatus($event, 'started')" [class.active]="filters.status == 'started'">Started</ion-button>
    <ion-button class="btn-option" (click)="filterByStatus($event, 'delivered')" [class.active]="filters.status == 'delivered'">Delivered</ion-button>
    <ion-button class="btn-option" (click)="filterByStatus($event, 'cancelled')" [class.active]="filters.status == 'cancelled'">Cancelled</ion-button>  
  
  <ion-grid>
    <ion-row>
      <ion-col size="6">
          <h5>From</h5>
          <ion-datetime pickerFormat="DD MMMM YYYY" displayFormat="DDD, MMM D, YYYY" [(ngModel)]="filters.startDate"></ion-datetime>
      </ion-col>
      <ion-col size="6">
          <h5>To</h5>
          <ion-datetime pickerFormat="DD MMMM YYYY" displayFormat="DDD, MMM D, YYYY" [(ngModel)]="filters.endDate"></ion-datetime>    
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-button class="btn-filter" (click)="filter()">
    Filter Results
  </ion-button>
</ion-content>
