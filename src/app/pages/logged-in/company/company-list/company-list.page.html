<ion-header mode="md" [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar class="container title">
    <ion-title class="ion-text-wrap">
      Clients
      <span *ngIf="totalCount && !this.loading">
        ({{totalCount}})
      </span>
      <span *ngIf="loading">
        (<ion-spinner></ion-spinner>)
      </span>
    </ion-title>
  </ion-toolbar>
  <ion-toolbar class="container search" [class.hidden]="borderLimit">
    <ion-searchbar debounce="500" placeholder="Type to search" (ionChange)="searchByName($event)"></ion-searchbar>
    <ion-buttons slot="end">
      <ion-button class="ion-text-capitalize setting" (click)="filter()">
        <ion-icon name="options"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  <div class="container">
    <div *ngIf="filters.status || (filters.approved_to_hire || filters.approved_to_hire == 0)" class="filter-tag">
      <ion-badge *ngIf="filters.status == 1">Active</ion-badge>
      <ion-badge *ngIf="filters.status == 2">Inactive</ion-badge>
      <ion-badge *ngIf="filters.status == 3">Active + 40 days no payment</ion-badge>
      <ion-badge *ngIf="filters.status == 4">Active + 40 days no new request</ion-badge>
      <ion-badge *ngIf="filters.approved_to_hire == 1">Approved to hire</ion-badge>
      <ion-badge *ngIf="filters.approved_to_hire == 0">Not approved to hire</ion-badge>
    </div>
    <ion-list *ngIf="!loading">
      <section>
        <app-company [company]="company" *ngFor="let company of companies" (click)="rowSelected(company)"></app-company>
      </section>
    </ion-list>

    <loading-modal [loading]="loading || loadingMore" type="company-list"></loading-modal>
    <no-items *ngIf="!loading && !loadingMore && companies && companies.length==0" message="~ No company available ~"></no-items>
  </div>

  <div class="add-request" tappable (click)="create()">
    <ion-icon name="add-outline"></ion-icon>
  </div>

    <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
      <ion-infinite-scroll-content></ion-infinite-scroll-content>
    </ion-infinite-scroll>

</ion-content>
