<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Generate ID Card</ion-title>

    <ion-buttons right>
      <button ion-button clear color="primary" [disabled]="!form.valid" (click)="generate()">
        Download Zip
      </button>
    </ion-buttons>

  </ion-navbar>
</ion-header>

<ion-content padding>

  <ion-segment [(ngModel)]="cndSegment" color="primary">
    <ion-segment-button value="not-generated" (ionSelect)="loadNotGenerated(1)">
      Not Generated
    </ion-segment-button>
    <ion-segment-button value="generated" (ionSelect)="loadGenerated(1)">
      Already Generated
    </ion-segment-button>      
  </ion-segment>
  
  <ion-searchbar
    [(ngModel)]="searchBar"
    (ionInput)="search()">
  </ion-searchbar> 

  <form [formGroup]="form">

    <ion-list>
      <ion-item *ngFor="let obj of candidatelistData; let i= index">
        <ion-label>{{ obj.candidate_name }}</ion-label>
        <ion-checkbox [(ngModel)]="candidates[i]" [ngModelOptions]="{standalone: true}"></ion-checkbox>
      </ion-item>
    </ion-list>

    <ion-row text-center>
      <div class="pagination-wrapper">
        <button *ngFor="let page of pages" ion-button small color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
          {{ page }}
        </button>
      </div>
    </ion-row>

  </form>
</ion-content>
