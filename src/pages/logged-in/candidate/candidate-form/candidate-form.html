<ion-header>
  <ion-navbar>
    <ion-title>{{ operation }}</ion-title>
    <ion-buttons right>
      <button ion-button clear color="primary" [disabled]="!form.valid || !form.dirty" (click)="save()">
        Save
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>

  <form [formGroup]="form">
    <!-- Grid for Required File Uploads -->
    <ion-grid id='uploads'>
      <ion-row>
        <ion-col col-4>
          <image-upload 
            label="Photo" icon="ios-person" prefix="photo"
            formControlName="photo">
          </image-upload>
        </ion-col>
        <ion-col col-4>
          <image-upload 
            label="Civil ID (Front)" icon="ios-card-outline" prefix="civilfront"
            formControlName="civilfront">
          </image-upload>
        </ion-col>
        <ion-col col-4>
          <image-upload 
            label="Civil ID (Back)" icon="ios-card" prefix="civilback"
            formControlName="civilback">
          </image-upload>
        </ion-col>
      </ion-row>
    </ion-grid>

    <!-- Rest of Form -->
    <ion-card>
      <ion-card-header>
        Civil ID
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label floating>Civil ID Number</ion-label>
          <ion-input type="text" formControlName="civil_id"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Civil ID Expiry Date</ion-label>
          <ion-datetime displayFormat="YYYY-MM-DD" [min]="minDate" [max]="maxDate" formControlName="expiry_date"></ion-datetime>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        Personal Information
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label floating>Name [English]</ion-label>
          <ion-input type="text" formControlName="name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Name [Arabic]</ion-label>
          <ion-input type="text" formControlName="name_ar"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Birth Date</ion-label>
          <ion-datetime displayFormat="YYYY-MM-DD" [min]="minBirthDate" [max]="maxBirthDate" formControlName="birth_date"></ion-datetime>
        </ion-item>
        <select-search-input formControlName="country_id"
          placeholder="Select Nationality" 
          [collection]="countrylistData" 
          valueAttr="country_id" 
          labelAttr="country_nationality_name_en">
        </select-search-input>
        <select-search-input formControlName="university_id"
          placeholder="Select University" 
          [collection]="universitylistData" 
          valueAttr="university_id" 
          labelAttr="university_name_en">
        </select-search-input>
        <ion-item>
          <ion-label floating>Phone Number</ion-label>
          <ion-input type="number" formControlName="phone"></ion-input>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        Payment
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label floating>Hourly Rate (KWD)</ion-label>
          <ion-input type="text" formControlName="hourly_rate"></ion-input>
        </ion-item>
      </ion-card-content>
    </ion-card>
    
    <ion-card>
      <ion-card-header>
        Bank Information
      </ion-card-header>
      <ion-card-content>

        <select-search-input formControlName="bank_id"
          placeholder="Select a Bank" 
          [collection]="banklistData" 
          valueAttr="bank_id" 
          labelAttr="bank_name">
        </select-search-input>

        <ion-item>
          <ion-label floating>Beneficiary Name</ion-label>
          <ion-input type="text" formControlName="bank_account_name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>IBAN</ion-label>
          <ion-input type="text" formControlName="iban"></ion-input>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        Login Information
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label floating>Email</ion-label>
          <ion-input type="text" formControlName="email"></ion-input>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <button ion-button block color="primary" [disabled]="!form.valid || !form.dirty" (click)="save()">
      Save
    </button>
    
  </form>
</ion-content>
