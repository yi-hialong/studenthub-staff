version: '2.6'

services:
  app:
    #container_name: plugn-dashboard-ionic
    image: node:14-alpine 
    #build: .
    environment:
      - BRANCH=grid
    command: sh -c "npm install -g @ionic/cli && npm install -f && ionic serve --configuration=docker --host=0.0.0.0"
    # --host=127.0.0.0 --port=8100 
    
    expose:
      - 8100
    ports:
      - 8100:8100
    extra_hosts:
      - "localhost:127.0.0.0"  
      - "localhost:0.0.0.0"  
    working_dir: /app
    volumes:
      - ./:/app  
      - ~/.gradle:/root/.gradle

