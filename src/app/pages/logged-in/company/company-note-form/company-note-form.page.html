<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button (click)="close()"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ operation }}</ion-title>

    <ion-buttons slot="end">
      <ion-button color="primary" [disabled]="form && !form.valid" (click)="save()">
        <span *ngIf="!saving">Save</span>
        <ion-spinner *ngIf="saving"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" *ngIf="form">
    <ion-list>
      <ng-container *ngIf="this.from !='post-update'">
      <ion-item *ngIf="['Suggested', 'Accepted', 'Rejected'].indexOf(form.controls.type.value) == -1">
        <div tabindex="0"></div>
        <ion-label position="floating">Note Type</ion-label>
        <ion-select formControlName="type">
          <ion-select-option>Internal Note</ion-select-option>
          <ion-select-option>Phone Call</ion-select-option>
          <ion-select-option>Email</ion-select-option>
          <ion-select-option>Meeting</ion-select-option>
          <ion-select-option>Interview</ion-select-option>
          <ion-select-option>Task</ion-select-option>
        </ion-select>
      </ion-item>

        <ion-item (click)="openClient($event)" *ngIf="this.from !='company-view'">
          <div tabindex="0"></div>
          <ion-label position="floating">Company Name</ion-label>
          <ion-input type="text" formControlName="company_name" readonly></ion-input>
        </ion-item>

        <ion-item (click)="openContact($event)">
          <div tabindex="0"></div>
          <ion-label position="floating">Contact</ion-label>
          <ion-input type="text" formControlName="contact_name" readonly></ion-input>
        </ion-item>

        <ion-item (click)="openRequest($event)">
          <div tabindex="0"></div>
          <ion-label position="floating">Request</ion-label>
          <ion-input type="text" formControlName="request_name" readonly></ion-input>
        </ion-item>
      </ng-container>

      <ion-item-divider class="ckeditor-title">
        <ion-label>
          Candidate or fulltimer note is about
        </ion-label>
      </ion-item-divider>

      <ckeditor [config]="editorConfig" #ckeditor [editor]="Editor" (ready)="onEditorReady()" (change)="onChange($event)">
      </ckeditor>

    </ion-list>
  </form>
</ion-content>
