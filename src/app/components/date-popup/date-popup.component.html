<ion-popover [trigger]="key" size="cover" class="date-popup-over" side="left" alignment="start">
  <ng-template>
    <ion-datetime
      (ionChange) = "close($event)"
      presentation="date"
      [min]="min"
      [max]="max"
      [value] = value
      [showDefaultButtons]="true"
    ></ion-datetime>
  </ng-template>
</ion-popover>
