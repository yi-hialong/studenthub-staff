<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar class="container">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/view/tasks"></ion-back-button>
    </ion-buttons>
    <ion-title>Countries</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">
  <div class="container">
    <ion-list>
      <ion-item tappable *ngFor="let country of countries" (click)="rowSelected(country)">
        <div tabindex="0"></div>
        <ion-label>
          {{ country.country_name_en }}
        </ion-label>
        <ion-badge slot="end" *ngIf="country.total_candidates > 0">
          {{ country.total_candidates }} candidates
        </ion-badge>
      </ion-item>

    </ion-list>

    <loading-modal [loading]="loading" type="text-list"></loading-modal>
  </div>
  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
